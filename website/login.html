<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — 음방시스템 관리자</title>
  <script src="env.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🎵</div>
      <h1 class="auth-title">음방시스템</h1>
      <p class="auth-subtitle">관리자 포털</p>
    </div>

    <form id="loginForm" class="auth-form" novalidate>
      <div class="field-group">
        <label class="field-label" for="username">아이디</label>
        <input
          type="text" id="username" name="username"
          class="field-input" placeholder="admin"
          autocomplete="username" required
        />
      </div>

      <div class="field-group">
        <label class="field-label" for="password">비밀번호</label>
        <div class="field-input-wrap">
          <input
            type="password" id="password" name="password"
            class="field-input" placeholder="••••••••"
            autocomplete="current-password" required
          />
          <button type="button" class="field-eye" id="togglePw" aria-label="비밀번호 보기">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <p class="auth-error" id="authError" hidden></p>

      <button type="submit" class="btn-primary btn-lg btn-block" id="btnLogin">
        <span id="btnLoginText">로그인</span>
        <span id="btnLoginSpinner" class="spinner" hidden></span>
      </button>
    </form>
  </div>

  <script>
    const API = window.__API_BASE__ || '';

    // Toggle password visibility
    document.getElementById('togglePw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('authError');
      const btnText = document.getElementById('btnLoginText');
      const btnSpinner = document.getElementById('btnLoginSpinner');
      const btn = document.getElementById('btnLogin');

      errEl.hidden = true;
      btn.disabled = true;
      btnText.hidden = true;
      btnSpinner.hidden = false;

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '로그인 실패');
        localStorage.setItem('amp_token', data.token);
        localStorage.setItem('amp_user', data.username);
        window.location.href = 'index.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.hidden = false;
      } finally {
        btn.disabled = false;
        btnText.hidden = false;
        btnSpinner.hidden = true;
      }
    });

    // Already logged in?
    if (localStorage.getItem('amp_token')) window.location.href = 'index.html';
  </script>
</body>
</html>
