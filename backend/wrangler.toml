name = "auto-music-player-backend"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "auto-music-player-db"
database_id = "YOUR_D1_DATABASE_ID"  # Replace after: wrangler d1 create auto-music-player-db

[vars]
ENVIRONMENT = "production"

# Secrets (set via: wrangler secret put JWT_SECRET)
# JWT_SECRET = <set via wrangler secret>

[dev]
port = 8787
local_protocol = "http"
